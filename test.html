<!DOCTYPE html>
<html>
<body>
<script>
    if (window.Telegram && window.Telegram.WebApp) {
        document.body.innerHTML = "<h1 style='color:green'>✅ Telegram Web App работает!</h1><p>User: " + JSON.stringify(window.Telegram.WebApp.initDataUnsafe.user);
        window.Telegram.WebApp.expand();
    } else {
        document.body.innerHTML = "<h1 style='color:red'>❌ Ошибка: не в Telegram Web App</h1><p>Запустите через кнопку меню бота.";
    }
</script>
</body>
</html>
