<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Miner's Empire — Telegram Web App</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1e0a2f 0%, #0b0317 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 12px;
            color: #f2eaff;
        }
        .game-container {
            max-width: 550px;
            margin: 0 auto;
            background: rgba(30, 15, 50, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 2.2rem;
            border: 1px solid rgba(170, 100, 255, 0.5);
            overflow: hidden;
            display: none;
        }
        .access-denied {
            text-align: center;
            padding: 40px;
            color: white;
            max-width: 500px;
            margin: 0 auto;
        }
        .currency-bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; background: rgba(0,0,0,0.4); }
        .currency-card { background: rgba(45,30,65,0.85); border-radius: 60px; padding: 4px 14px; display: flex; align-items: center; gap: 8px; }
        .currency-icon { font-size: 1.2rem; }
        .currency-amount { font-size: 1rem; font-weight: 700; }
        .nav-strip { display: flex; background: #140a20; padding: 6px 12px; gap: 6px; overflow-x: auto; }
        .nav-btn { background: #2e1a44; border: none; padding: 8px 16px; font-size: 0.75rem; font-weight: 600; color: #eadaff; cursor: pointer; border-radius: 40px; }
        .nav-btn.active { background: #9b4dff; color: #0f071a; }
        .panel { display: none; padding: 18px 14px; animation: fade 0.2s; }
        .panel.active-panel { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .btn-glow { background: linear-gradient(95deg, #a258ff, #6e2dd4); border: none; border-radius: 50px; padding: 8px 16px; font-weight: bold; color: white; cursor: pointer; }
        .btn-secondary { background: #392a52; border: none; border-radius: 50px; padding: 6px 14px; font-weight: bold; color: #e7d9ff; cursor: pointer; }
        .collect-block { background: rgba(0,0,0,0.35); border-radius: 1.5rem; padding: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .exchange-panel { background: #1f112ecc; border-radius: 1.2rem; padding: 10px; margin-bottom: 12px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px; }
        .exchange-input { background: #2d1d41; border: 1px solid #b77cff; padding: 6px 12px; border-radius: 30px; color: #f0e4ff; width: 100px; text-align: center; }
        .miners-list { display: flex; flex-direction: column; gap: 10px; }
        .miner-card { background: rgba(40,25,60,0.8); border-radius: 1.2rem; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #bf7aff; }
        .shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 12px; }
        .shop-item { background: #2e1d48; border-radius: 1rem; padding: 10px; text-align: center; }
        .tasks-stack { display: flex; flex-direction: column; gap: 12px; }
        .task-card { background: #1f1233; border-radius: 1rem; padding: 10px; }
        .progress-bar { background: #3e2a58; border-radius: 20px; height: 6px; overflow: hidden; margin: 6px 0; }
        .progress-fill { background: #c47dff; width: 0%; height: 100%; }
        .vip-badge { background: linear-gradient(95deg, #b77cff, #7d3ac1); border-radius: 1.2rem; padding: 8px 16px; margin-bottom: 14px; display: flex; justify-content: space-between; }
        .top-list { max-height: 300px; overflow-y: auto; }
        .top-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #aa66ff40; }
        .top-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .admin-panel { background: #1f1030; border-radius: 1rem; padding: 12px; margin-top: 12px; }
        .footer-note { font-size: 0.6rem; text-align: center; margin-top: 14px; opacity: 0.6; }
    </style>
</head>
<body>
<div id="accessDenied" class="access-denied" style="display: block;">
    <h2>⛔ Загрузка...</h2>
    <p>Проверка окружения...</p>
</div>
<div class="game-container" id="gameRoot"></div>

<script>
    // -------------------- 1. НАДЁЖНАЯ ПРОВЕРКА TELEGRAM WEB APP --------------------
    let tg = null;
    let telegramUser = null;
    let isTelegramEnv = false;

    try {
        // Пытаемся получить объект WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            const initData = tg.initDataUnsafe;
            if (initData && initData.user) {
                isTelegramEnv = true;
                telegramUser = initData.user;
                telegramUser.photoUrl = telegramUser.photo_url || "https://via.placeholder.com/32";
                console.log("✅ Telegram Web App detected:", telegramUser);
                document.getElementById('accessDenied').style.display = 'none';
                document.getElementById('gameRoot').style.display = 'block';
            } else {
                throw new Error("No user data in initDataUnsafe");
            }
        } else {
            throw new Error("window.Telegram.WebApp not found");
        }
    } catch (e) {
        console.error("❌ Telegram Web App error:", e);
        document.getElementById('accessDenied').innerHTML = `
            <h2>⛔ Доступ запрещён</h2>
            <p>Игра работает только через Telegram Web App.<br>
            Пожалуйста, откройте приложение через кнопку меню бота или инлайн-кнопку с параметром <code>web_app</code>.</p>
            <p>Если вы уже в Telegram, попробуйте перезапустить бота или очистить кеш.</p>
        `;
        throw e;
    }

    // -------------------- 2. FIREBASE CONFIG --------------------
    const firebaseConfig = {
        apiKey: "AIzaSyA8KWTdXPxfwniTrPqvea5zAc_ZMmjr5Yc",
        authDomain: "shaxter-7bdc7.firebaseapp.com",
        projectId: "shaxter-7bdc7",
        storageBucket: "shaxter-7bdc7.firebasestorage.app",
        messagingSenderId: "179139005325",
        appId: "1:179139005325:web:8d2e9aa81b61f0510c4bc4",
        measurementId: "G-VP4Q6PN36S"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // -------------------- 3. ГЛОБАЛЬНЫЕ ДАННЫЕ --------------------
    const userId = telegramUser.id.toString();
    const userName = telegramUser.username || `user_${userId}`;
    const firstName = telegramUser.first_name || "";
    const photoUrl = telegramUser.photoUrl;
    const ADMIN_ID = "998579758";
    let isAdmin = (userId === ADMIN_ID);

    let gameData = {
        diamonds: 0, gold: 10000, oil: 0, bucks: 0, superBucks: 0,
        miners: [0,0,0,0,0,0,0,0],
        pending: 0,
        totalMined: 0,
        prestigeMult: 1.0,
        prestigeCount: 0,
        vipActive: false,
        vipExpire: 0,
        lastDaily: 0,
        lastVipChest: 0,
        islandUnlocked: false,
        lastExpedition: 0,
        playSeconds: 0,
        referralCode: `REF${userId.slice(-6)}`,
        referrals: [],
        refEarnings: 0,
        storyTasks: [
            { name:"💎 Алмазный ручей", need:1000, current:0, rewardOil:0, rewardGold:200, type:"mine" },
            { name:"💎 Алмазная лавина", need:1000000, current:0, rewardOil:1, rewardGold:0, type:"mine" },
            { name:"🏗️ Шахтный инвестор", need:5, current:0, rewardOil:0, rewardGold:300, type:"buy" },
            { name:"🏗️ Магнат", need:50, current:0, rewardOil:1, rewardGold:0, type:"buy" },
            { name:"🎁 Коллекционер", need:3, current:0, rewardOil:0, rewardGold:250, type:"openBox" },
            { name:"🎁 Архивариус", need:20, current:0, rewardOil:1, rewardGold:0, type:"openBox" }
        ],
        premiumTasks: []
    };
    let pendingPremRequests = [];

    // -------------------- 4. ИНИЦИАЛИЗАЦИЯ FIREBASE --------------------
    async function initFirebaseUser() {
        await auth.signInAnonymously();
        const userRef = database.ref('users/' + userId);
        const snapshot = await userRef.once('value');
        if (!snapshot.exists()) {
            const newUser = {
                telegramId: userId, username: userName, firstName, photoUrl, isBlocked: false,
                diamonds: 0, gold: 10000, oil: 0, bucks: 0, superBucks: 0,
                miners: [0,0,0,0,0,0,0,0], pending: 0, totalMined: 0,
                prestigeMult: 1.0, prestigeCount: 0, vipActive: false, vipExpire: 0,
                lastDaily: 0, lastVipChest: 0, islandUnlocked: false, lastExpedition: 0,
                playSeconds: 0, referralCode: `REF${userId.slice(-6)}`, referrals: [], refEarnings: 0,
                storyTasks: gameData.storyTasks.map(t => ({ ...t, current: 0 })),
                premiumTasks: []
            };
            await userRef.set(newUser);
            Object.assign(gameData, newUser);
        } else {
            const data = snapshot.val();
            if (data.isBlocked) {
                document.getElementById('accessDenied').innerHTML = '<h2>🚫 Вы заблокированы</h2><p>Обратитесь к администратору @nukm0</p>';
                document.getElementById('accessDenied').style.display = 'block';
                document.getElementById('gameRoot').style.display = 'none';
                return;
            }
            Object.assign(gameData, data);
        }
        // Слушаем изменения в реальном времени
        userRef.on('value', (snap) => {
            const val = snap.val();
            if (val && !val.isBlocked) {
                Object.assign(gameData, val);
                updateUIAll();
            } else if (val && val.isBlocked) {
                location.reload();
            }
        });
        // Загружаем глобальные задания
        const tasksSnap = await database.ref('premiumTasks').once('value');
        if (tasksSnap.exists()) gameData.premiumTasks = Object.values(tasksSnap.val());
        database.ref('premiumTasks').on('value', (snap) => {
            gameData.premiumTasks = snap.exists() ? Object.values(snap.val()) : [];
            renderPremiumTasks();
        });
        if (isAdmin) {
            database.ref('premiumRequests').on('value', (snap) => {
                pendingPremRequests = snap.exists() ? Object.values(snap.val()) : [];
                renderAdminPanel();
            });
        }
        startGameLoop();
        renderFullUI();
        document.getElementById('gameRoot').style.display = 'block';
        document.getElementById('accessDenied').style.display = 'none';
    }

    // Сохранение в Firebase
    function saveUserData() {
        const updates = {
            diamonds: gameData.diamonds, gold: gameData.gold, oil: gameData.oil,
            bucks: gameData.bucks, superBucks: gameData.superBucks,
            miners: gameData.miners, pending: gameData.pending, totalMined: gameData.totalMined,
            prestigeMult: gameData.prestigeMult, prestigeCount: gameData.prestigeCount,
            vipActive: gameData.vipActive, vipExpire: gameData.vipExpire,
            lastDaily: gameData.lastDaily, lastVipChest: gameData.lastVipChest,
            islandUnlocked: gameData.islandUnlocked, lastExpedition: gameData.lastExpedition,
            playSeconds: gameData.playSeconds, storyTasks: gameData.storyTasks,
            refEarnings: gameData.refEarnings
        };
        database.ref('users/' + userId).update(updates);
    }

    // -------------------- 5. ИГРОВАЯ ЛОГИКА (основные функции, аналогичны предыдущему коду) --------------------
    const minersData = [
        null,
        { level:1, name:"⛏️ Шахтёр Lv.1", hourly:100, costGold:1000, prodSec: 100/3600 },
        { level:2, name:"⛏️ Шахтёр Lv.2", hourly:700, costGold:5000, prodSec: 700/3600 },
        { level:3, name:"⛏️ Шахтёр Lv.3", hourly:3500, costGold:20000, prodSec: 3500/3600 },
        { level:4, name:"⛏️ Шахтёр Lv.4", hourly:10500, costGold:50000, prodSec: 10500/3600 },
        { level:5, name:"⛏️ Шахтёр Lv.5", hourly:18000, costGold:75000, prodSec: 18000/3600 },
        { level:6, name:"⛏️ Шахтёр Lv.6", hourly:28000, costGold:100000, prodSec: 28000/3600 },
        { level:7, name:"⛏️ Шахтёр Lv.7", hourly:100000, costGold:300000, prodSec: 100000/3600 }
    ];

    function getTotalProd() {
        let total = 0;
        for(let i=1;i<=7;i++) total += gameData.miners[i] * minersData[i].prodSec;
        total *= gameData.prestigeMult;
        if(gameData.vipActive) total *= 2;
        return total;
    }
    function getMaxStorage() {
        let prod = getTotalProd();
        if(prod <= 0) return 0;
        let maxSec = 3 * 3600;
        if(gameData.vipActive) return Infinity;
        return prod * maxSec;
    }

    let lastUpdate = Date.now();
    function updatePending() {
        let now = Date.now();
        let delta = Math.min(5, (now - lastUpdate)/1000);
        if(delta <= 0) return;
        let earn = getTotalProd() * delta;
        if(earn > 0) {
            let maxStore = getMaxStorage();
            let newPending = gameData.pending + earn;
            if(newPending > maxStore && maxStore !== Infinity) newPending = maxStore;
            gameData.pending = newPending;
        }
        lastUpdate = now;
        updateUIAll();
        updateStoryTasks('mine', earn);
    }

    function collect() {
        if(gameData.pending <= 0) { showToast("Нет алмазов"); return; }
        let gain = Math.floor(gameData.pending);
        gameData.diamonds += gain;
        gameData.totalMined += gain;
        gameData.pending = 0;
        updateUIAll(); showToast(`+${gain} 💎`); saveUserData();
        updateLeaderboard();
    }
    function buyMiner(lvl) {
        let price = minersData[lvl].costGold;
        if(gameData.gold >= price) {
            gameData.gold -= price;
            gameData.miners[lvl]++;
            updateStoryTasks('buy', 1);
            updateUIAll(); renderMiners(); saveUserData();
            showToast(`Нанят ${minersData[lvl].name}`);
        } else showToast(`Нужно ${price}💰`);
    }
    function exchangeDiamonds() {
        let inp = document.getElementById("exchangeDiaInput");
        let amount = parseInt(inp.value);
        if(isNaN(amount) || amount < 100) { showToast("От 100💎"); return; }
        if(gameData.diamonds >= amount) {
            let goldGain = amount / 100;
            gameData.diamonds -= amount;
            gameData.gold += goldGain;
            updateUIAll(); saveUserData();
            showToast(`-${amount}💎 +${goldGain}💰`);
        } else showToast("Не хватает");
    }
    function exchangeAll() {
        if(gameData.diamonds < 100) return;
        let amount = Math.floor(gameData.diamonds / 100) * 100;
        let goldGain = amount / 100;
        gameData.diamonds -= amount;
        gameData.gold += goldGain;
        updateUIAll(); saveUserData();
        showToast(`-${amount}💎 +${goldGain}💰`);
    }
    function buySuperBucks() {
        let inp = document.getElementById("superBuyInput");
        let goldAmt = parseInt(inp.value);
        if(isNaN(goldAmt) || goldAmt < 10) { showToast("Минимум 10💰"); return; }
        let sbGain = Math.floor(goldAmt / 10);
        if(gameData.gold >= goldAmt) {
            gameData.gold -= goldAmt;
            gameData.superBucks += sbGain;
            updateUIAll(); saveUserData();
            showToast(`+${sbGain} 💸`);
        } else showToast("Мало золота");
    }
    function buySuperMax() {
        let possible = Math.floor(gameData.gold / 10);
        if(possible === 0) return;
        gameData.gold -= possible * 10;
        gameData.superBucks += possible;
        updateUIAll(); saveUserData();
        showToast(`+${possible} 💸`);
    }

    function randomRange(min,max) { return Math.floor(Math.random()*(max-min+1)+min); }
    function isProfitable() { return Math.random() < 0.05; }
    function bronzeDrop() {
        if(isProfitable()) {
            return { gold: randomRange(800,1000), diamonds: randomRange(8000,10000), bucks: randomRange(30,40), superBucks: randomRange(120,150), miners: { level:1, count: randomRange(1,2) } };
        } else {
            return { gold: randomRange(1,50), diamonds: randomRange(1,200), bucks: randomRange(0,2), superBucks: randomRange(1,10) };
        }
    }
    function silverDrop() {
        if(isProfitable()) {
            return { gold: randomRange(2000,3000), diamonds: randomRange(20000,25000), superBucks: randomRange(270,350), miners: { level:2, count: randomRange(1,3) } };
        } else {
            return { gold: randomRange(1,100), diamonds: randomRange(1,500), superBucks: randomRange(1,15) };
        }
    }
    function goldenDrop() {
        if(isProfitable()) {
            return { gold: randomRange(4000,5000), diamonds: randomRange(40000,50000), superBucks: randomRange(600,750), miners: { level:4, count:1 } };
        } else {
            return { gold: randomRange(1,200), diamonds: randomRange(1,1000), superBucks: randomRange(1,30) };
        }
    }
    function starterDrop() {
        if(isProfitable()) {
            return { gold: randomRange(50000,100000), diamonds: randomRange(200000,500000), superBucks: randomRange(400,1000), miners: { l6:1, l5:randomRange(1,3), l4:randomRange(1,5), l3:randomRange(1,5) } };
        } else {
            return { gold: randomRange(1000,10000), diamonds: randomRange(1000,10000), superBucks: randomRange(10,100) };
        }
    }
    function oilChestDrop() { return { oil: randomRange(20,160) }; }
    function oilResourceBoxDrop() {
        if(isProfitable()) {
            return { gold: randomRange(15000,30000), diamonds: randomRange(15000,30000), miners: { level: randomRange(5,6), count:1 } };
        } else {
            return { gold: randomRange(500,5000), diamonds: randomRange(500,5000) };
        }
    }
    function applyDrop(drop) {
        if(drop.gold) gameData.gold += drop.gold;
        if(drop.diamonds) gameData.diamonds += drop.diamonds;
        if(drop.superBucks) gameData.superBucks += drop.superBucks;
        if(drop.bucks) gameData.bucks += drop.bucks;
        if(drop.oil) gameData.oil += drop.oil;
        if(drop.miners) {
            if(drop.miners.level) gameData.miners[drop.miners.level] += drop.miners.count;
            else {
                if(drop.miners.l6) gameData.miners[6] += drop.miners.l6;
                if(drop.miners.l5) gameData.miners[5] += drop.miners.l5;
                if(drop.miners.l4) gameData.miners[4] += drop.miners.l4;
                if(drop.miners.l3) gameData.miners[3] += drop.miners.l3;
            }
        }
        updateUIAll(); renderMiners(); saveUserData();
        updateStoryTasks('openBox', 1);
    }
    function openBox(price, currencyType, dropFunc) {
        if(currencyType === 'super' && gameData.superBucks < price) { showToast(`Нужно ${price} 💸`); return false; }
        if(currencyType === 'bucks' && gameData.bucks < price) { showToast(`Нужно ${price} 💵`); return false; }
        if(currencyType === 'oil' && gameData.oil < price) { showToast(`Нужно ${price} 🛢️`); return false; }
        if(currencyType === 'super') gameData.superBucks -= price;
        else if(currencyType === 'bucks') gameData.bucks -= price;
        else if(currencyType === 'oil') gameData.oil -= price;
        let drop = dropFunc();
        applyDrop(drop);
        showModal("🎁 Результат", formatDrop(drop));
        return true;
    }
    function formatDrop(drop) {
        let lines = [];
        if(drop.gold) lines.push(`💰 +${drop.gold}`);
        if(drop.diamonds) lines.push(`💎 +${drop.diamonds}`);
        if(drop.superBucks) lines.push(`💸 +${drop.superBucks}`);
        if(drop.bucks) lines.push(`💵 +${drop.bucks}`);
        if(drop.oil) lines.push(`🛢️ +${drop.oil}`);
        if(drop.miners) {
            if(drop.miners.level) lines.push(`⛏ +${drop.miners.count} шахтёр ${drop.miners.level}ур`);
            else {
                if(drop.miners.l6) lines.push(`⛏ +${drop.miners.l6} шахтёр 6ур`);
                if(drop.miners.l5) lines.push(`⛏ +${drop.miners.l5} шахтёр 5ур`);
                if(drop.miners.l4) lines.push(`⛏ +${drop.miners.l4} шахтёр 4ур`);
                if(drop.miners.l3) lines.push(`⛏ +${drop.miners.l3} шахтёр 3ур`);
            }
        }
        return lines;
    }
    function showModal(title, lines) {
        let modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `<div class="modal-window"><h3>${title}</h3><div>${lines.join("<br>")}</div><button class="close-modal-btn" style="background:#9b4dff; border:none; border-radius:40px; padding:8px 20px; margin-top:12px;">Закрыть</button></div>`;
        document.body.appendChild(modal);
        modal.querySelector(".close-modal-btn").onclick = () => modal.remove();
    }
    function showToast(msg) {
        let t = document.createElement("div");
        t.innerText = msg;
        t.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#221b33; color:#f0deff; padding:8px 20px; border-radius:60px; backdrop-filter:blur(8px); z-index:9999;";
        document.body.appendChild(t);
        setTimeout(()=>t.remove(), 2000);
    }

    // -------------------- ЗАДАНИЯ --------------------
    function updateStoryTasks(type, amount) {
        gameData.storyTasks.forEach(t => {
            if(t.type === type) {
                t.current += amount;
                if(t.current >= t.need) {
                    if(t.rewardOil) gameData.oil += t.rewardOil;
                    if(t.rewardGold) gameData.gold += t.rewardGold;
                    showToast(`✅ ${t.name} выполнен! +${t.rewardOil?t.rewardOil+"🛢️":t.rewardGold+"💰"}`);
                    t.current = 0;
                    t.need = Math.floor(t.need * 1.5);
                    if(t.need < 2) t.need = 2;
                    saveUserData();
                }
            }
        });
        renderStoryTasks();
        updateUIAll();
    }

    async function createPremiumTask() {
        let desc = document.getElementById("taskDesc").value.trim();
        let link = document.getElementById("taskLink").value.trim();
        let amount = parseInt(document.getElementById("taskRewardAmount").value);
        let curr = document.querySelector(".currency-option.selected")?.dataset.curr || "💎";
        if(!desc || !link || !amount) { showToast("Заполните все поля"); return; }
        const newTask = { id: Date.now().toString(), desc, link, rewardCurrency: curr, rewardAmount: amount, creatorId: userId, approvedBy: [] };

    // -------------------- ПРЕСТИЖ --------------------
    function getPrestigeCost() {
        let count = gameData.prestigeCount;
        return { bucksCost: Math.floor(50 * Math.pow(1.10, count)), superCost: Math.floor(2000 * Math.pow(1.35, count)) };
    }
    function doPrestige() {
        let { bucksCost, superCost } = getPrestigeCost();
        if(gameData.bucks < bucksCost || gameData.superBucks < superCost) {
            showToast(`Нужно ${bucksCost}💵 и ${superCost}💸`);
            return;
        }
        gameData.bucks -= bucksCost;
        gameData.superBucks -= superCost;
        gameData.prestigeMult += 0.1;
        gameData.prestigeCount++;
        let savedOil = gameData.oil;
        let savedBucks = gameData.bucks;
        gameData.diamonds = 0;
        gameData.gold = 10000;
        gameData.miners = [0,0,0,0,0,0,0,0];
        gameData.pending = 0;
        gameData.totalMined = 0;
        gameData.islandUnlocked = false;
        gameData.lastExpedition = 0;
        gameData.storyTasks.forEach(t => { t.current = 0; t.need = t.need > 1000 ? 1000 : t.need; });
        gameData.oil = savedOil;
        gameData.bucks = savedBucks;
        showToast(`✨ Престиж! Множитель x${gameData.prestigeMult.toFixed(2)}. Выдано 10000💰`);
        updateUIAll(); renderMiners(); renderStoryTasks(); saveUserData();
        updateLeaderboard();
    }

    // -------------------- ОСТРОВ, БОНУСЫ, VIP --------------------
    function buyIsland() {
        if(gameData.islandUnlocked) return showToast("Уже куплен");
        if(gameData.oil >= 100) { gameData.oil -= 100; gameData.islandUnlocked = true; updateUIAll(); saveUserData(); showToast("Остров открыт"); }
        else showToast("Нужно 100 нефти");
    }
    function startExpedition() {
        if(!gameData.islandUnlocked) return;
        let now = Date.now();
        let cd = 12*3600*1000;
        if(gameData.lastExpedition && (now - gameData.lastExpedition) < cd) {
            let left = cd - (now - gameData.lastExpedition);
            showToast(`Экспедиция через ${Math.floor(left/3600000)}ч`);
            return;
        }
        let prodHour = getTotalProd() * 3600;
        if(Math.random()<0.4) { gameData.oil += 1; showToast(`🛢️ +1 нефть`); }
        else { let dia = Math.floor(prodHour * (0.5+Math.random()*1.5)); if(dia<50) dia=100; gameData.diamonds += dia; gameData.totalMined += dia; showToast(`💎 +${dia} алмазов`); }
        gameData.lastExpedition = now;
        updateUIAll(); saveUserData();
        updateLeaderboard();
    }
    function dailyReward() {
        let now = Date.now();
        if(gameData.lastDaily && (now - gameData.lastDaily) < 24*3600*1000) { showToast("Бонус через 24ч"); return; }
        let prodHour = getTotalProd() * 3600;
        if(prodHour < 100) prodHour = 1000;
        let r = Math.random();
        if(r < 0.33) { let lvl = randomRange(1,3); gameData.miners[lvl]++; showToast(`🎁 +1 шахтёр ${lvl} ур.`); }
        else if(r < 0.66) { let gold = Math.floor(prodHour * 0.2); if(gold<200) gold=500; gameData.gold += gold; showToast(`🎁 +${gold}💰`); }
        else { let dia = Math.floor(prodHour * 1.5); if(dia<300) dia=1000; gameData.diamonds += dia; showToast(`🎁 +${dia}💎`); }
        gameData.lastDaily = now;
        updateUIAll(); renderMiners(); saveUserData();
    }
    function vipChestDaily() {
        if(!gameData.vipActive) { showToast("Нужен VIP"); return; }
        let now = Date.now();
        if(gameData.lastVipChest && (now - gameData.lastVipChest) < 24*3600*1000) { showToast("VIP клад через 24ч"); return; }
        let r = Math.random();
        if(r<0.25) { gameData.oil += 1; showToast("VIP клад: +1🛢️"); }
        else if(r<0.5) { let g = randomRange(5000,20000); gameData.gold += g; showToast(`VIP: +${g}💰`); }
        else if(r<0.75) { let d = randomRange(10000,100000); gameData.diamonds += d; showToast(`VIP: +${d}💎`); }
        else { let lvl = randomRange(3,5); gameData.miners[lvl]++; showToast(`VIP: +1 шахтёр ${lvl}ур.`); }
        gameData.lastVipChest = now;
        updateUIAll(); renderMiners(); saveUserData();
    }
    function buyVIP(days, costBucks) {
        if(gameData.bucks < costBucks) { showToast(`Нужно ${costBucks} 💵`); return; }
        gameData.bucks -= costBucks;
        let expire = Date.now() + days * 24 * 3600 * 1000;
        if(!gameData.vipActive || gameData.vipExpire < expire) gameData.vipExpire = expire;
        gameData.vipActive = true;
        showToast(`🎖️ VIP на ${days} день(дней) активирован!`);
        updateUIAll(); saveUserData();
    }

    async function searchUser() {
        let query = document.getElementById("adminSearchUser").value;
        let usersRef = database.ref('users');
        let snap = await usersRef.orderByChild('username').equalTo(query).once('value');
        let found = null;
        if(snap.exists()) snap.forEach(c=>found={id:c.key,data:c.val()});
        if(!found) { let byId = await usersRef.child(query).once('value'); if(byId.exists()) found={id:query,data:byId.val()}; }
        if(found) document.getElementById("adminUserInfo").innerHTML = `<div>${found.data.username} (${found.id})</div><input type="hidden" id="selectedUserId" value="${found.id}">`;
        else document.getElementById("adminUserInfo").innerHTML = "Не найден";
    }
    async function modifyBalance(action) {
        let uid = document.getElementById("selectedUserId")?.value;
        if(!uid) return;
        let currency = document.querySelector("#adminPanel .preset-buttons button.active")?.dataset.currency;
        if(!currency) return;
        let amount = parseInt(document.getElementById("adminAmount").value);
        if(isNaN(amount)) return;
        let ref = database.ref('users/' + uid);
        ref.transaction(user => { if(user) { if(action==='give') user[currency] += amount; else user[currency] = Math.max(0, user[currency] - amount); } return user; });
    }
    async function toggleBlock(block) {
        let uid = document.getElementById("selectedUserId")?.value;
        if(!uid) return;
        await database.ref('users/' + uid).update({ isBlocked: block });
        alert(block?"Заблокирован":"Разблокирован");
    }

        let container = document.getElementById("adminRequestsList");
        if(!container) return;
        container.innerHTML = pendingPremRequests.map(req => `<div>${req.username}: ${req.taskDesc} <button data-approve="${req.id}">✅</button></div>`).join('');
        document.querySelectorAll("[data-approve]").forEach(btn => btn.addEventListener("click", async () => {
            let req = pendingPremRequests.find(r=>r.id === btn.dataset.approve);
            if(req) {
                let userRef = database.ref('users/' + req.userId);
                userRef.transaction(user => {
                    if(user) {
                        let curr = req.rewardCurrency, amt = req.rewardAmount;
                        if(curr==="💎") user.diamonds += amt;
                        else if(curr==="💰") user.gold += amt;
                        else if(curr==="🛢️") user.oil += amt;
                        else if(curr==="💵") user.bucks += amt;
                        else if(curr==="💸") user.superBucks += amt;
                    }
                    return user;
                });
                await database.ref('premiumRequests/' + req.id).remove();
            }
        }));
    }

                <div style="background:#1f112eb3; border-radius:1rem; padding:1rem;">
                    <h3>🌴 Нефтяной остров</h3>
                    <p>Открыть: 100 🛢️. Экспедиция раз в 12ч.</p>
                    <div id="islandStatus"></div>
                    <button id="buyIslandBtn" class="btn-glow">🏝️ Купить (100 нефти)</button>
                    <button id="expeditionBtn" class="btn-secondary" disabled>🚢 Экспедиция</button>
                </div>
            </div>
            <div id="profilePanel" class="panel">
                <div style="background:#1f1133; border-radius:1rem; padding:12px; margin-bottom:12px;">
                    <div>👤 ${firstName} (@${userName})</div>
                    <div>⏱ Время в игре: <span id="playTimePretty">0 сек</span></div>
                    <div>👥 Рефералов: <span id="refCount">0</span> | 💵 Заработано: <span id="refEarn">0</span></div>
                    <div class="ref-link" id="refLink" style="background:#2d1d42; padding:6px; border-radius:30px; font-size:0.7rem;"></div>
                    <button id="copyRefBtn" class="btn-secondary">📋 Копировать ссылку</button>
                </div>
                <div style="background:#1f1133; border-radius:1rem; padding:12px; margin-bottom:12px;">
                    <h4>✨ ПРЕСТИЖ (множитель дохода)</h4>
                    <div>Текущий множитель: x<span id="prestigeMult">1.00</span></div>
                    <div>Стоимость: <span id="prestigeCostBucks">50</span> 💵 + <span id="prestigeCostSuper">2000</span> 💸</div>
                    <button id="prestigeBtn" class="btn-glow">💫 Улучшить престиж (+0.1x)</button>
                </div>
                <div style="background:#1f1133; border-radius:1rem; padding:12px; margin-bottom:12px;">
                    <h4>🎁 Бонусы</h4>
                    <button id="dailyBonusBtn" class="btn-glow" style="width:100%; margin-bottom:6px;">📅 Ежедневный бонус (24ч)</button>
                    <button id="vipChestBtn" class="btn-glow" style="width:100%;">🎖️ VIP клад (раз в день)</button>
                </div>
                <div style="background:#1f1133; border-radius:1rem; padding:12px;">
                    <h4>➕ СОЗДАТЬ ПРЕМИУМ-ЗАДАНИЕ</h4>
                    <input type="text" id="taskDesc" placeholder="Описание" style="width:100%; background:#2d1d42; border-radius:30px; padding:6px; margin:6px 0; color:white;">
                    <input type="text" id="taskLink" placeholder="Ссылка (Telegram)" style="width:100%; background:#2d1d42; border-radius:30px; padding:6px; margin:6px 0; color:white;">
                    <div class="currency-select" id="rewardCurrencySelect">
                        <div class="currency-option" data-curr="💎">💎</div><div class="currency-option" data-curr="💰">💰</div><div class="currency-option" data-curr="🛢️">🛢️</div><div class="currency-option" data-curr="💵">💵</div><div class="currency-option" data-curr="💸">💸</div>
                    </div>
                    <input type="number" id="taskRewardAmount" placeholder="Сумма" value="10" style="width:100%; background:#2d1d42; border-radius:30px; padding:6px; margin:6px 0; color:white;">
                    <button id="createPremiumTaskBtn" class="btn-glow">🔗 Создать задание</button>
                </div>
            </div>
            <div id="topPanel" class="panel">
                <div class="online-count">👥 Онлайн: <span id="onlineCount">0</span> игроков</div>
                <div class="shop-title">🏆 Топ 100 по алмазам</div>
                <div class="top-list" id="topList"></div>
            </div>
            <div id="faqPanel" class="panel">
                <div style="background:#1f1133; border-radius:1rem; padding:12px;">
                    <p><strong>💎 Алмазы</strong> — добываются шахтёрами, собираются накоплениями.</p>
                    <p><strong>💰 Золото</strong> — покупает шахтёров и обменивается на 💸.</p>
                    <p><strong>🛢️ Нефть</strong> — редкая валюта для острова и нефтяных боксов.</p>
                    <p><strong>💵 Баксы</strong> — донатная валюта, покупает премиум-боксы и VIP.</p>
                    <p><strong>💸 Супер-баксы</strong> — покупают обычные боксы.</p>
                    <p><strong>🎖️ VIP</strong> — удваивает добычу, бесконечный склад, особые бонусы.</p>
                    <p><strong>✨ Престиж</strong> — увеличивает доход, но сбрасывает прогресс (кроме 💵 и 🛢️).</p>
                    <p><strong>📦 Боксы</strong> — шанс окупаемости 5%.</p>
                </div>
            </div>`;
        // Навешиваем обработчики вкладок
        document.querySelectorAll(".nav-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
                btn.classList.add("active");
                document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active-panel"));
                document.getElementById(btn.dataset.panel+"Panel").classList.add("active-panel");
                if(btn.dataset.panel === "shop") renderShop();
                if(btn.dataset.panel === "tasks") { renderStoryTasks(); renderPremiumTasks(); }
                if(btn.dataset.panel === "profile") renderAdminPanel();
                if(btn.dataset.panel === "top") renderTop();
                if(btn.dataset.panel === "island") renderIsland();
            });
        });
        document.getElementById("collectBtn").onclick = collect;
        document.getElementById("exchangeBtn").onclick = exchangeDiamonds;
        document.getElementById("exchangeAllBtn").onclick = exchangeAll;
        document.getElementById("buySuperBtn").onclick = buySuperBucks;
        document.getElementById("buySuperMaxBtn").onclick = buySuperMax;
        document.getElementById("dailyBonusBtn").onclick = dailyReward;
        document.getElementById("vipChestBtn").onclick = vipChestDaily;
        document.getElementById("prestigeBtn").onclick = doPrestige;
        document.getElementById("buyIslandBtn").onclick = buyIsland;
        document.getElementById("expeditionBtn").onclick = startExpedition;
        document.getElementById("copyRefBtn").onclick = () => { navigator.clipboard.writeText(window.location.href); showToast("Ссылка скопирована"); };
        document.getElementById("createPremiumTaskBtn").onclick = createPremiumTask;
        // Выбор валюты для создания задания
        document.querySelectorAll(".currency-option").forEach(opt => {
            opt.onclick = () => { document.querySelectorAll(".currency-option").forEach(o=>o.classList.remove("selected")); opt.classList.add("selected"); };
        });
        document.querySelector(".currency-option").classList.add("selected");
        // Онлайн счётчик (имитация)
        setInterval(() => { let online = Math.floor(80 + Math.random() * 250); document.getElementById("onlineCount").innerText = online; }, 30000);
        // Обновление времени в игре
        setInterval(() => {
            let sec = gameData.playSeconds;
            let days = Math.floor(sec/86400), hours = Math.floor((sec%86400)/3600), mins = Math.floor((sec%3600)/60);
            document.getElementById("playTimePretty").innerHTML = days?`${days}д ${hours}ч`:(hours?`${hours}ч ${mins}мин`:(mins?`${mins}мин`:`${sec}сек`));
            document.getElementById("refCount").innerText = gameData.referrals.length;
            document.getElementById("refEarn").innerText = gameData.refEarnings.toFixed(2);
            document.getElementById("refLink").innerText = window.location.href;
        }, 1000);
        updateUIAll(); renderMiners(); renderShop(); renderStoryTasks(); renderPremiumTasks(); renderIsland(); renderTop();
        if(isAdmin) renderAdminPanel();
    }

    // -------------------- ЗАПУСК --------------------
    initFirebaseUser();
</script>
</body>
</html>
