<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Miner's Empire — Telegram Web App</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1e0a2f 0%, #0b0317 100%);
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            padding: 12px;
            color: #f2eaff;
        }

        .game-container {
            max-width: 550px;
            margin: 0 auto;
            background: rgba(30, 15, 50, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 2.2rem;
            border: 1px solid rgba(170, 100, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .currency-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid #aa55ff80;
        }
        .currency-card {
            background: rgba(45, 30, 65, 0.85);
            border-radius: 60px;
            padding: 4px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .currency-icon { font-size: 1.2rem; }
        .currency-amount { font-size: 1rem; font-weight: 700; }

        .nav-strip {
            display: flex;
            background: #140a20;
            padding: 6px 12px;
            gap: 6px;
            overflow-x: auto;
        }
        .nav-btn {
            background: #2e1a44;
            border: none;
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #eadaff;
            cursor: pointer;
            border-radius: 40px;
            white-space: nowrap;
        }
        .nav-btn.active {
            background: #9b4dff;
            color: #0f071a;
        }

        .panel {
            display: none;
            padding: 18px 14px;
            animation: fade 0.2s ease;
        }
        .panel.active-panel { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        .btn-glow {
            background: linear-gradient(95deg, #a258ff, #6e2dd4);
            border: none;
            border-radius: 50px;
            padding: 8px 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .btn-secondary {
            background: #392a52;
            border: none;
            border-radius: 50px;
            padding: 6px 14px;
            font-weight: bold;
            color: #e7d9ff;
            cursor: pointer;
        }

        .collect-block {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 1.5rem;
            padding: 12px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .rates-panel {
            background: #1f1133cc;
            border-radius: 1.2rem;
            padding: 10px;
            margin: 12px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .rate-item {
            background: #2d1d42;
            padding: 5px 12px;
            border-radius: 40px;
        }

        .miners-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .miner-card {
            background: rgba(40, 25, 60, 0.8);
            border-radius: 1.2rem;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #bf7aff;
        }

        .tasks-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .task-card {
            background: #1f1233;
            border-radius: 1rem;
            padding: 10px;
        }
        .progress-bar {
            background: #3e2a58;
            border-radius: 20px;
            height: 6px;
            overflow: hidden;
            margin: 6px 0;
        }
        .progress-fill { background: #c47dff; width: 0%; height: 100%; }

        .vip-badge {
            background: linear-gradient(95deg, #b77cff, #7d3ac1);
            border-radius: 1.2rem;
            padding: 8px 16px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-window {
            background: #241a37;
            border-radius: 1.8rem;
            max-width: 320px;
            width: 85%;
            padding: 1.2rem;
            border: 1px solid #bb7aff;
        }
        .top-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .top-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid #aa66ff40;
        }
        .top-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .online-count {
            background: #2d1d42;
            border-radius: 20px;
            padding: 4px 12px;
            display: inline-block;
            margin-bottom: 12px;
        }
        .currency-select {
            display: flex;
            gap: 12px;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .currency-option {
            background: #2e1d48;
            border-radius: 40px;
            padding: 4px 12px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .currency-option.selected {
            border-color: #c47dff;
            background: #9b4dff;
        }
        .admin-panel {
            background: #1f1030;
            border-radius: 1rem;
            padding: 12px;
            margin-top: 12px;
        }
        .user-search {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }
        .user-search input {
            flex: 1;
            background: #2d1d42;
            border: 1px solid #b77cff;
            border-radius: 30px;
            padding: 6px 12px;
            color: white;
        }
        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .footer-note { font-size: 0.6rem; text-align: center; margin-top: 14px; opacity: 0.6; }
        @media (max-width: 480px) {
            .currency-card { padding: 2px 10px; }
            .nav-btn { padding: 6px 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot" style="display: none;">
    <!-- Контент будет показан после авторизации -->
</div>
<div id="accessDenied" style="text-align: center; padding: 40px; color: white;">
    <h2>⛔ Доступ запрещён</h2>
    <p>Игра работает только через Telegram Web App.<br>Откройте приложение через бота.</p>
</div>

<script>
    // -------------------- FIREBASE CONFIG --------------------
    const firebaseConfig = {
        apiKey: "AIzaSyA8KWTdXPxfwniTrPqvea5zAc_ZMmjr5Yc",
        authDomain: "shaxter-7bdc7.firebaseapp.com",
        projectId: "shaxter-7bdc7",
        storageBucket: "shaxter-7bdc7.firebasestorage.app",
        messagingSenderId: "179139005325",
        appId: "1:179139005325:web:8d2e9aa81b61f0510c4bc4",
        measurementId: "G-VP4Q6PN36S"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // -------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ --------------------
    let currentUser = null;      // данные из Telegram
    let dbUser = null;           // данные из Firebase
    let isAdmin = false;
    let gameData = {
        diamonds: 0, gold: 10000, oil: 0, bucks: 0, superBucks: 0,
        miners: [0,0,0,0,0,0,0,0],
        pending: 0,
        totalMined: 0,
        prestigeMult: 1.0,
        prestigeCount: 0,
        vipActive: false,
        vipExpire: 0,
        lastDaily: 0,
        lastVipChest: 0,
        islandUnlocked: false,
        lastExpedition: 0,
        playSeconds: 0,
        referralCode: "",
        referrals: [],
        refEarnings: 0,
        storyTasks: [
            { name:"💎 Алмазный ручей", need:1000, current:0, rewardOil:0, rewardGold:200, type:"mine" },
            { name:"💎 Алмазная лавина", need:1000000, current:0, rewardOil:1, rewardGold:0, type:"mine" },
            { name:"🏗️ Шахтный инвестор", need:5, current:0, rewardOil:0, rewardGold:300, type:"buy" },
            { name:"🏗️ Магнат", need:50, current:0, rewardOil:1, rewardGold:0, type:"buy" },
            { name:"🎁 Коллекционер", need:3, current:0, rewardOil:0, rewardGold:250, type:"openBox" },
            { name:"🎁 Архивариус", need:20, current:0, rewardOil:1, rewardGold:0, type:"openBox" }
        ],
        premiumTasks: []   // { id, desc, link, rewardCurrency, rewardAmount, creatorId, status, approvedBy }
    };
    let pendingPremRequests = []; // заявки на выполнение заданий (id задания, userId, подтверждение админом)

    // -------------------- ПРОВЕРКА TELEGRAM WEB APP --------------------
    const tg = window.Telegram?.WebApp;
    if (!tg) {
        document.getElementById('accessDenied').style.display = 'block';
        throw new Error("Not in Telegram Web App");
    }
    tg.expand();
    const initDataUnsafe = tg.initDataUnsafe;
    if (!initDataUnsafe || !initDataUnsafe.user) {
        document.getElementById('accessDenied').innerHTML = '<h2>⛔ Ошибка</h2><p>Не удалось получить данные пользователя. Перезапустите бота.</p>';
        throw new Error("No user data");
    }
    const telegramUser = initDataUnsafe.user;
    const userId = telegramUser.id.toString();
    const userName = telegramUser.username || `user_${userId}`;
    const firstName = telegramUser.first_name || "";
    const photoUrl = telegramUser.photo_url || "https://via.placeholder.com/32";

    // Админ проверка
    const ADMIN_ID = "998579758";  // ID @nukm0
    const ADMIN_USERNAME = "nukm0";

    // -------------------- АВТОРИЗАЦИЯ В FIREBASE + ЗАГРУЗКА ДАННЫХ --------------------
    async function initFirebaseUser() {
        await auth.signInAnonymously();
        const userRef = database.ref('users/' + userId);
        const snapshot = await userRef.once('value');
        if (!snapshot.exists()) {
            // Создаём нового пользователя
            const newUser = {
                telegramId: userId,
                username: userName,
                firstName: firstName,
                photoUrl: photoUrl,
                isBlocked: false,
                diamonds: 0,
                gold: 10000,
                oil: 0,
                bucks: 0,
                superBucks: 0,
                miners: [0,0,0,0,0,0,0,0],
                pending: 0,
                totalMined: 0,
                prestigeMult: 1.0,
                prestigeCount: 0,
                vipActive: false,
                vipExpire: 0,
                lastDaily: 0,
                lastVipChest: 0,
                islandUnlocked: false,
                lastExpedition: 0,
                playSeconds: 0,
                referralCode: `REF${userId.slice(-6)}`,
                referrals: [],
                refEarnings: 0,
                storyTasks: gameData.storyTasks.map(t => ({ name: t.name, need: t.need, current: 0, rewardOil: t.rewardOil, rewardGold: t.rewardGold, type: t.type })),
                premiumTasks: []
            };
            await userRef.set(newUser);
            dbUser = newUser;
        } else {
            dbUser = snapshot.val();
            // если заблокирован
            if (dbUser.isBlocked) {
                document.getElementById('accessDenied').innerHTML = '<h2>🚫 Вы заблокированы</h2><p>Обратитесь к администратору @nukm0</p>';
                document.getElementById('accessDenied').style.display = 'block';
                throw new Error("User blocked");
            }
        }
        isAdmin = (userId === ADMIN_ID);
        // Переносим данные в gameData
        Object.assign(gameData, dbUser);
        if (!gameData.storyTasks) gameData.storyTasks = dbUser.storyTasks || gameData.storyTasks;
        // Подписка на реальное время
        userRef.on('value', (snap) => {
            dbUser = snap.val();
            if (dbUser && !dbUser.isBlocked) {
                Object.assign(gameData, dbUser);
                updateUIAll();
            } else if (dbUser && dbUser.isBlocked) {
                alert("Вы заблокированы!");
                document.getElementById('gameRoot').style.display = 'none';
                document.getElementById('accessDenied').style.display = 'block';
                document.getElementById('accessDenied').innerHTML = '<h2>🚫 Вы заблокированы</h2><p>Обратитесь к администратору @nukm0</p>';
            }
        });
        // Загружаем премиум-задания (глобальные)
        const tasksSnapshot = await database.ref('premiumTasks').once('value');
        if (tasksSnapshot.exists()) {
            gameData.premiumTasks = Object.values(tasksSnapshot.val());
        } else {
            gameData.premiumTasks = [];
        }
        // Подписываемся на обновления заданий
        database.ref('premiumTasks').on('value', (snap) => {
            if (snap.exists()) gameData.premiumTasks = Object.values(snap.val());
            else gameData.premiumTasks = [];
            renderPremiumTasks();
        });
        // Загружаем заявки на выполнение (для админа)
        if (isAdmin) {
            database.ref('premiumRequests').on('value', (snap) => {
                if (snap.exists()) pendingPremRequests = Object.values(snap.val());
                else pendingPremRequests = [];
                if (document.getElementById('adminPanel')) renderAdminPanel();
            });
        }
        startGameLoop();
        renderGameUI();
        document.getElementById('gameRoot').style.display = 'block';
        document.getElementById('accessDenied').style.display = 'none';
    }

    // -------------------- СОХРАНЕНИЕ В FIREBASE --------------------
    function saveUserData() {
        if (!dbUser) return;
        const updates = {
            diamonds: gameData.diamonds,
            gold: gameData.gold,
            oil: gameData.oil,
            bucks: gameData.bucks,
            superBucks: gameData.superBucks,
            miners: gameData.miners,
            pending: gameData.pending,
            totalMined: gameData.totalMined,
            prestigeMult: gameData.prestigeMult,
            prestigeCount: gameData.prestigeCount,
            vipActive: gameData.vipActive,
            vipExpire: gameData.vipExpire,
            lastDaily: gameData.lastDaily,
            lastVipChest: gameData.lastVipChest,
            islandUnlocked: gameData.islandUnlocked,
            lastExpedition: gameData.lastExpedition,
            playSeconds: gameData.playSeconds,
            storyTasks: gameData.storyTasks,
            refEarnings: gameData.refEarnings
        };
        database.ref('users/' + userId).update(updates);
    }

    // -------------------- ИГРОВАЯ ЛОГИКА (сокращённо, основные функции) --------------------
    function getTotalProd() { /* ... */ }
    function getMaxStorage() { /* ... */ }
    // (здесь будут все функции игры, но они аналогичны предыдущим версиям, просто используют gameData)
    // Для краткости я покажу только ключевые изменения, а полный код с функциями будет в финальном ответе.

    // -------------------- АДМИН-ПАНЕЛЬ --------------------
    function renderAdminPanel() {
        if (!isAdmin) return;
        const profileDiv = document.getElementById('profilePanel');
        let adminHtml = `<div class="admin-panel"><h4>👑 АДМИН-ПАНЕЛЬ</h4>`;
        adminHtml += `<div><input type="text" id="adminSearchUser" placeholder="ID или юзернейм"><button id="adminSearchBtn">Найти</button></div>`;
        adminHtml += `<div id="adminUserInfo"></div>`;
        adminHtml += `<div class="preset-buttons"><button data-currency="diamonds">💎 Алмазы</button><button data-currency="gold">💰 Золото</button><button data-currency="oil">🛢️ Нефть</button><button data-currency="bucks">💵 Баксы</button><button data-currency="superBucks">💸 Супер-баксы</button></div>`;
        adminHtml += `<div><input type="number" id="adminAmount" placeholder="Количество"><button id="adminGiveBtn">Выдать</button><button id="adminTakeBtn">Забрать</button></div>`;
        adminHtml += `<div><button id="adminBlockBtn">Заблокировать</button><button id="adminUnblockBtn">Разблокировать</button></div>`;
        adminHtml += `<hr><h5>Премиум-задания</h5>`;
        adminHtml += `<div><input type="text" id="adminTaskDesc" placeholder="Описание"><input type="text" id="adminTaskLink" placeholder="Ссылка"><select id="adminTaskCurrency"><option value="💎">💎</option><option value="💰">💰</option><option value="🛢️">🛢️</option><option value="💵">💵</option><option value="💸">💸</option></select><input type="number" id="adminTaskAmount" placeholder="Сумма"><button id="adminAddTask">➕ Добавить</button></div>`;
        adminHtml += `<div id="adminTasksList"></div>`;
        adminHtml += `<hr><h5>Заявки на выполнение</h5><div id="adminRequestsList"></div>`;
        adminHtml += `</div>`;
        // Вставляем в профиль
        const existing = document.getElementById('adminPanel');
        if (existing) existing.remove();
        const panelDiv = document.createElement('div');
        panelDiv.id = 'adminPanel';
        panelDiv.innerHTML = adminHtml;
        profileDiv.appendChild(panelDiv);
        // Обработчики
        document.getElementById('adminSearchBtn').onclick = () => searchUser();
        document.getElementById('adminGiveBtn').onclick = () => modifyBalance('give');
        document.getElementById('adminTakeBtn').onclick = () => modifyBalance('take');
        document.getElementById('adminBlockBtn').onclick = () => toggleBlock(true);
        document.getElementById('adminUnblockBtn').onclick = () => toggleBlock(false);
        document.getElementById('adminAddTask').onclick = () => addGlobalTask();
        renderAdminTasks();
        renderRequests();
    }

    async function searchUser() {
        const query = document.getElementById('adminSearchUser').value;
        const usersRef = database.ref('users');
        const snapshot = await usersRef.orderByChild('username').equalTo(query).once('value');
        let found = null;
        if (snapshot.exists()) {
            snapshot.forEach(child => { found = { id: child.key, data: child.val() }; });
        } else {
            const byId = await usersRef.child(query).once('value');
            if (byId.exists()) found = { id: query, data: byId.val() };
        }
        if (found) {
            document.getElementById('adminUserInfo').innerHTML = `<div>Пользователь: ${found.data.username} (${found.id})</div><div>Балансы: 💎${found.data.diamonds} 💰${found.data.gold} 🛢️${found.data.oil} 💵${found.data.bucks} 💸${found.data.superBucks}</div><input type="hidden" id="selectedUserId" value="${found.id}">`;
        } else {
            document.getElementById('adminUserInfo').innerHTML = `Не найден`;
        }
    }
    function modifyBalance(action) {
        const userId = document.getElementById('selectedUserId')?.value;
        if (!userId) return;
        const currency = document.querySelector('#adminPanel .preset-buttons button.active')?.dataset.currency;
        if (!currency) return;
        const amount = parseInt(document.getElementById('adminAmount').value);
        if (isNaN(amount)) return;
        const ref = database.ref('users/' + userId);
        ref.transaction(user => {
            if (user) {
                if (action === 'give') user[currency] += amount;
                else user[currency] = Math.max(0, user[currency] - amount);
            }
            return user;
        });
    }
    async function toggleBlock(block) {
        const userId = document.getElementById('selectedUserId')?.value;
        if (!userId) return;
        await database.ref('users/' + userId).update({ isBlocked: block });
        alert(block ? "Заблокирован" : "Разблокирован");
    }
    async function addGlobalTask() {
        const desc = document.getElementById('adminTaskDesc').value;
        const link = document.getElementById('adminTaskLink').value;
        const currency = document.getElementById('adminTaskCurrency').value;
        const amount = parseInt(document.getElementById('adminTaskAmount').value);
        if (!desc || !link || !amount) return;
        const newTask = { id: Date.now().toString(), desc, link, rewardCurrency: currency, rewardAmount: amount, creatorId: ADMIN_ID, approvedBy: [] };
        await database.ref('premiumTasks/' + newTask.id).set(newTask);
        alert("Задание добавлено");
    }
    async function renderAdminTasks() {
        const tasks = gameData.premiumTasks;
        const container = document.getElementById('adminTasksList');
        if (!container) return;
        container.innerHTML = tasks.map(t => `<div>${t.desc} (${t.rewardAmount} ${t.rewardCurrency}) <button data-del="${t.id}">Удалить</button></div>`).join('');
        document.querySelectorAll('[data-del]').forEach(btn => {
            btn.onclick = async () => {
                await database.ref('premiumTasks/' + btn.dataset.del).remove();
            };
        });
    }
    async function renderRequests() {
        const container = document.getElementById('adminRequestsList');
        if (!container) return;
        container.innerHTML = pendingPremRequests.map(req => `<div>Запрос от ${req.username} на задание "${req.taskDesc}" <button data-approve="${req.id}">✅ Подтвердить</button></div>`).join('');
        document.querySelectorAll('[data-approve]').forEach(btn => {
            btn.onclick = async () => {
                const reqId = btn.dataset.approve;
                const req = pendingPremRequests.find(r => r.id === reqId);
                if (req) {
                    // Выдать награду
                    const userRef = database.ref('users/' + req.userId);
                    userRef.transaction(user => {
                        if (user) {
                            const curr = req.rewardCurrency;
                            const amount = req.rewardAmount;
                            if (curr === "💎") user.diamonds += amount;
                            else if (curr === "💰") user.gold += amount;
                            else if (curr === "🛢️") user.oil += amount;
                            else if (curr === "💵") user.bucks += amount;
                            else if (curr === "💸") user.superBucks += amount;
                        }
                        return user;
                    });
                    await database.ref('premiumRequests/' + reqId).remove();
                }
            };
        });
    }

    // -------------------- ОТРИСОВКА ИГРЫ (сокращённо) --------------------
    function updateUIAll() { /* обновление всех элементов */ }
    function renderMiners() { /* ... */ }
    function renderShop() { /* ... */ }
    function renderStoryTasks() { /* ... */ }
    function renderPremiumTasks() {
        const container = document.getElementById('premiumTasksList');
        if (!container) return;
        container.innerHTML = gameData.premiumTasks.map((t, idx) => `<div class="task-card"><b>${t.desc}</b><br>Награда: ${t.rewardAmount} ${t.rewardCurrency}<br><button class="btn-secondary" data-task-id="${t.id}">Выполнить</button></div>`).join('');
        document.querySelectorAll('[data-task-id]').forEach(btn => {
            btn.onclick = async () => {
                const taskId = btn.dataset.taskId;
                const task = gameData.premiumTasks.find(t => t.id === taskId);
                if (!task) return;
                // Открываем ссылку
                window.open(task.link, '_blank');
                // Отправляем запрос админу
                const request = {
                    id: Date.now().toString(),
                    userId: userId,
                    username: userName,
                    taskId: task.id,
                    taskDesc: task.desc,
                    rewardCurrency: task.rewardCurrency,
                    rewardAmount: task.rewardAmount
                };
                await database.ref('premiumRequests/' + request.id).set(request);
                alert("Заявка отправлена администратору. После проверки подписки вы получите награду.");
            };
        });
    }
    function renderTop() {
        const topRef = database.ref('users');
        topRef.orderByChild('totalMined').limitToLast(100).once('value', (snap) => {
            const users = [];
            snap.forEach(child => users.push({ id: child.key, ...child.val() }));
            users.sort((a,b) => b.totalMined - a.totalMined);
            const container = document.getElementById('topList');
            if (container) {
                container.innerHTML = users.map((u, idx) => `<div class="top-item"><img class="top-avatar" src="${u.photoUrl||'https://via.placeholder.com/32'}" onerror="this.src='https://via.placeholder.com/32'"><span>${idx+1}. ${u.username}</span><span>${Math.floor(u.totalMined)} 💎</span></div>`).join('');
            }
        });
    }

    function startGameLoop() {
        setInterval(() => { gameData.playSeconds++; saveUserData(); updateUIAll(); }, 1000);
        setInterval(() => { /* пассивный доход */ }, 1000);
    }

        // Вставляем в #gameRoot

        container.innerHTML = `...`; // здесь полная разметка, но для краткости оставлю заглушку
        // Навешиваем обработчики
    }

    // Запуск
    initFirebaseUser();
</script>
