<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Miner's Empire — Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1e0a2f 0%, #0b0317 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 12px;
            color: #f2eaff;
        }
        .game-container {
            max-width: 550px;
            margin: 0 auto;
            background: rgba(30, 15, 50, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 2.2rem;
            border: 1px solid rgba(170, 100, 255, 0.5);
            overflow: hidden;
        }
        .loading-screen { text-align: center; padding: 40px; color: #A78BFA; font-size: 1.2rem; }
        .guest-badge {
            background: #ff9900;
            color: #1a1a2e;
            text-align: center;
            padding: 6px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .currency-bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; background: rgba(0,0,0,0.4); }
        .currency-card { background: rgba(45,30,65,0.85); border-radius: 60px; padding: 4px 14px; display: flex; align-items: center; gap: 8px; flex: 1; min-width: 75px; justify-content: center; }
        .currency-icon { font-size: 1.1rem; }
        .currency-amount { font-size: 0.95rem; font-weight: 700; }
        .nav-strip { display: flex; background: #140a20; padding: 6px 12px; gap: 6px; overflow-x: auto; }
        .nav-btn { background: #2e1a44; border: none; padding: 8px 12px; font-size: 0.7rem; font-weight: 600; color: #eadaff; cursor: pointer; border-radius: 40px; white-space: nowrap; flex-shrink: 0; }
        .nav-btn.active { background: #9b4dff; color: #0f071a; }
        .panel { display: none; padding: 16px 12px; animation: fade 0.2s; }
        .panel.active-panel { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .btn-glow { background: linear-gradient(95deg, #a258ff, #6e2dd4); border: none; border-radius: 50px; padding: 8px 14px; font-weight: bold; color: white; cursor: pointer; font-size: 0.8rem; }
        .btn-secondary { background: #392a52; border: none; border-radius: 50px; padding: 6px 12px; font-weight: bold; color: #e7d9ff; cursor: pointer; font-size: 0.75rem; }
        .collect-block { background: rgba(0,0,0,0.35); border-radius: 1.2rem; padding: 12px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .exchange-panel { background: #1f112ecc; border-radius: 1rem; padding: 10px; margin-bottom: 10px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px; }
        .exchange-input { background: #2d1d41; border: 1px solid #b77cff; padding: 6px 10px; border-radius: 30px; color: #f0e4ff; width: 90px; text-align: center; font-size: 0.8rem; }
        .miners-list { display: flex; flex-direction: column; gap: 8px; }
        .miner-card { background: rgba(40,25,60,0.8); border-radius: 1rem; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #bf7aff; gap: 8px; flex-wrap: wrap; }
        .shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 12px; }
        .shop-item { background: #2e1d48; border-radius: 1rem; padding: 10px; text-align: center; }
        .tasks-stack { display: flex; flex-direction: column; gap: 10px; }
        .task-card { background: #1f1233; border-radius: 1rem; padding: 10px; }
        .progress-bar { background: #3e2a58; border-radius: 20px; height: 5px; overflow: hidden; margin: 6px 0; }
        .progress-fill { background: #c47dff; width: 0%; height: 100%; }
        .vip-badge { background: linear-gradient(95deg, #b77cff, #7d3ac1); border-radius: 1.2rem; padding: 8px 12px; margin-bottom: 12px; display: flex; justify-content: space-between; font-size: 0.75rem; }
        .top-list { max-height: 250px; overflow-y: auto; }
        .top-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #aa66ff40; }
        .admin-card { background: rgba(0,0,0,0.4); border-radius: 1rem; padding: 14px; margin-top: 16px; border: 1px solid #ffd96655; }
        .admin-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: #ffd966; }
        .admin-search { display: flex; gap: 8px; margin-bottom: 12px; }
        .admin-search input { flex: 1; background: #2d1d42; border: 1px solid #b77cff; border-radius: 30px; padding: 8px 12px; color: white; }
        .admin-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .preset-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .preset-buttons button { background: #2e1d48; border: none; border-radius: 30px; padding: 5px 10px; cursor: pointer; color: #e7d9ff; }
        .preset-buttons button.active { background: #9b4dff; color: white; }
        .ref-link { background: #2d1d42; padding: 6px; border-radius: 30px; font-size: 0.65rem; word-break: break-all; }
        .vip-icon { color: #ffd700; margin-left: 4px; font-size: 0.8rem; }
        .profile-avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #9b4dff; margin-bottom: 8px; }
        .avatar-loading { width: 60px; height: 60px; border-radius: 50%; background: #2d1d42; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .footer-note { font-size: 0.6rem; text-align: center; margin-top: 12px; opacity: 0.6; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-window { background: #241a37; border-radius: 1.5rem; max-width: 300px; width: 85%; padding: 1.2rem; border: 1px solid #bb7aff; }
        .close-modal-btn { background: #9b4dff; border: none; border-radius: 40px; padding: 8px 16px; margin-top: 12px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
<div id="globalContainer">
    <div class="game-container" id="gameRoot"></div>
</div>

<script>
    // ==================== 1. ОПРЕДЕЛЕНИЕ РЕЖИМА (TELEGRAM / ГОСТЬ) ====================
    let isTelegram = false;
    let tg = null;
    let user = null;
    let userId = null;
    let userName = null;
    let firstName = null;
    let lastName = null;
    let fullName = null;
    let guestId = null;
    
    try {
        tg = window.Telegram?.WebApp;
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) {
            isTelegram = true;
            tg.ready();
            tg.expand();
            user = tg.initDataUnsafe.user;
            userId = user.id.toString();
            userName = user.username || `user_${userId}`;
            firstName = user.first_name || "";
            lastName = user.last_name || "";
            fullName = `${firstName} ${lastName}`.trim() || "Пользователь";
            console.log("✅ Telegram mode:", userId);
        } else {
            isTelegram = false;
            guestId = "guest_" + Math.random().toString(36).substring(2, 10);
            userId = guestId;
            userName = "Гость";
            firstName = "Гость";
            lastName = "";
            fullName = "Гостевой режим";
            console.log("👤 Guest mode:", guestId);
        }
    } catch(e) {
        isTelegram = false;
        guestId = "guest_" + Math.random().toString(36).substring(2, 10);
        userId = guestId;
        userName = "Гость";
        firstName = "Гость";
        fullName = "Гостевой режим";
        console.log("👤 Guest mode (fallback):", guestId);
    }
    
    const BOT_TOKEN = "8713610873:AAEOhfPSacosSUWcWLYlmDfLXvDHuAoRq2E";
    const BOT_USERNAME = "minermine1_bot";
    const SUPPORT_CHAT = "@sup_miner_help";
    const ADMIN_ID = "998579758";
    let isAdmin = (isTelegram && userId === ADMIN_ID);
    
    // ==================== 2. FIREBASE (только для Telegram) ====================
    const firebaseConfig = {
        apiKey: "AIzaSyA8KWTdXPxfwniTrPqvea5zAc_ZMmjr5Yc",
        authDomain: "shaxter-7bdc7.firebaseapp.com",
        projectId: "shaxter-7bdc7",
        storageBucket: "shaxter-7bdc7.firebasestorage.app",
        messagingSenderId: "179139005325",
        appId: "1:179139005325:web:8d2e9aa81b61f0510c4bc4",
        measurementId: "G-VP4Q6PN36S"
    };
    let database = null;
    let auth = null;
    
    if (isTelegram) {
        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            auth = firebase.auth();
            console.log("Firebase initialized for Telegram user");
        } catch(e) {
            console.warn("Firebase init error:", e);
            isTelegram = false; // fallback to guest mode if Firebase fails
            userId = "guest_" + Math.random().toString(36).substring(2, 10);
            userName = "Гость";
            fullName = "Гостевой режим (Firebase error)";
            isAdmin = false;
        }
    }
    
    // ==================== 3. ИГРОВЫЕ ДАННЫЕ (локальные для гостя, синхронизированные для Telegram) ====================
    let gameData = {
        diamonds: 0, gold: 10000, oil: 0, bucks: 0, superBucks: 0,
        miners: [0,0,0,0,0,0,0,0],
        pending: 0,
        totalMined: 0,
        prestigeMult: 1.0,
        prestigeCount: 0,
        vipActive: false,
        vipExpire: 0,
        lastDaily: 0,
        lastVipChest: 0,
        islandUnlocked: false,
        lastExpedition: 0,
        playSeconds: 0,
        referralCode: isTelegram ? `REF${userId.slice(-6)}` : "GUEST",
        referredBy: "",
        referrals: [],
        refEarnings: 0,
        dailyLogin: { lastLoginDate: 0, currentDay: 0 },
        progressiveTasks: {
            type: "buyMiners",
            level: 0,
            current: 0,
            need: [5,10,20,35,55,80,110,150,200,300],
            rewards: [
                { minerLevel: 1, count: 2 }, { minerLevel: 1, count: 3 }, { minerLevel: 2, count: 2 },
                { minerLevel: 2, count: 3 }, { minerLevel: 3, count: 2 }, { minerLevel: 3, count: 3 },
                { minerLevel: 4, count: 2 }, { minerLevel: 4, count: 3 }, { minerLevel: 5, count: 2 },
                { minerLevel: 5, count: 3 }
            ]
        },
        storyTasks: [
            { name:"💎 Алмазный ручей", need:1000, current:0, rewardOil:0, rewardGold:200, type:"mine" },
            { name:"💎 Алмазная лавина", need:1000000, current:0, rewardOil:1, rewardGold:0, type:"mine" },
            { name:"🏗️ Шахтный инвестор", need:5, current:0, rewardOil:0, rewardGold:300, type:"buy" },
            { name:"🏗️ Магнат", need:50, current:0, rewardOil:1, rewardGold:0, type:"buy" },
            { name:"🎁 Коллекционер", need:3, current:0, rewardOil:0, rewardGold:250, type:"openBox" },
            { name:"🎁 Архивариус", need:20, current:0, rewardOil:1, rewardGold:0, type:"openBox" }
        ],
        premiumTasks: []
    };
    
    // ==================== 4. ФУНКЦИИ РАБОТЫ С ХРАНИЛИЩЕМ ====================
    function loadGameData() {
        if (isTelegram && database) {
            // Асинхронно загрузим из Firebase, пока заглушка
            return;
        } else {
            const saved = localStorage.getItem("miner_guest_" + guestId);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.assign(gameData, data);
                } catch(e) {}
            }
            applyLoadedData();
        }
    }
    
    function saveGameData() {
        if (isTelegram && database) {
            // синхронизация с Firebase
            if (auth && database) {
                auth.signInAnonymously().then(() => {
                    database.ref('users/' + userId).update({
                        diamonds: gameData.diamonds,
                        gold: gameData.gold,
                        oil: gameData.oil,
                        bucks: gameData.bucks,
                        superBucks: gameData.superBucks,
                        miners: gameData.miners,
                        pending: gameData.pending,
                        totalMined: gameData.totalMined,
                        prestigeMult: gameData.prestigeMult,
                        prestigeCount: gameData.prestigeCount,
                        vipActive: gameData.vipActive,
                        vipExpire: gameData.vipExpire,
                        lastDaily: gameData.lastDaily,
                        lastVipChest: gameData.lastVipChest,
                        islandUnlocked: gameData.islandUnlocked,
                        lastExpedition: gameData.lastExpedition,
                        playSeconds: gameData.playSeconds,
                        storyTasks: gameData.storyTasks,
                        dailyLogin: gameData.dailyLogin,
                        progressiveTasks: gameData.progressiveTasks
                    }).catch(e => console.warn("Firebase save error", e));
                }).catch(e => console.warn("Auth error", e));
            }
        } else {
            localStorage.setItem("miner_guest_" + guestId, JSON.stringify({
                diamonds: gameData.diamonds, gold: gameData.gold, oil: gameData.oil,
                bucks: gameData.bucks, superBucks: gameData.superBucks,
                miners: gameData.miners, pending: gameData.pending, totalMined: gameData.totalMined,
                prestigeMult: gameData.prestigeMult, prestigeCount: gameData.prestigeCount,
                vipActive: gameData.vipActive, vipExpire: gameData.vipExpire,
                lastDaily: gameData.lastDaily, lastVipChest: gameData.lastVipChest,
                islandUnlocked: gameData.islandUnlocked, lastExpedition: gameData.lastExpedition,
                playSeconds: gameData.playSeconds, storyTasks: gameData.storyTasks,
                dailyLogin: gameData.dailyLogin, progressiveTasks: gameData.progressiveTasks
            }));
        }
    }
    
    function applyLoadedData() {
        updateUIAll();
        renderMiners();
        renderStoryTasks();
        if (isTelegram && database) {
            // дополнительно загрузим премиум-задания
            database.ref('premiumTasks').once('value', snap => {
                if (snap.exists()) gameData.premiumTasks = Object.values(snap.val());
                else gameData.premiumTasks = [];
                renderPremiumTasks();
                if (isAdmin) renderAdminPanel();
            });
            database.ref('premiumTasks').on('value', snap => {
                gameData.premiumTasks = snap.exists() ? Object.values(snap.val()) : [];
                renderPremiumTasks();
            });
        } else {
            gameData.premiumTasks = [];
            renderPremiumTasks();
        }
        startGameLoop();
        renderFullUI();
    }
    
    // ==================== 5. ИГРОВАЯ ЛОГИКА (общая для гостя и Telegram) ====================
    const minersData = [
        null,
        { level:1, name:"⛏️ Шахтёр Lv.1", hourly:100, costGold:1000, prodSec: 100/3600 },
        { level:2, name:"⛏️ Шахтёр Lv.2", hourly:700, costGold:5000, prodSec: 700/3600 },
        { level:3, name:"⛏️ Шахтёр Lv.3", hourly:3500, costGold:20000, prodSec: 3500/3600 },
        { level:4, name:"⛏️ Шахтёр Lv.4", hourly:10500, costGold:50000, prodSec: 10500/3600 },
        { level:5, name:"⛏️ Шахтёр Lv.5", hourly:18000, costGold:75000, prodSec: 18000/3600 },
        { level:6, name:"⛏️ Шахтёр Lv.6", hourly:28000, costGold:100000, prodSec: 28000/3600 },
        { level:7, name:"⛏️ Шахтёр Lv.7", hourly:100000, costGold:300000, prodSec: 100000/3600 }
    ];
    
    function getTotalProd() {
        let total = 0;
        for(let i=1;i<=7;i++) total += gameData.miners[i] * minersData[i].prodSec;
        total *= gameData.prestigeMult;
        if(gameData.vipActive) total *= 2;
        return total;
    }
    function getMaxStorage() {
        let prod = getTotalProd();
        if(prod <= 0) return 0;
        let maxSec = 3 * 3600;
        if(gameData.vipActive) return Infinity;
        return prod * maxSec;
    }
    
    let lastUpdate = Date.now();
    function updatePending() {
        let now = Date.now();
        let delta = Math.min(5, (now - lastUpdate)/1000);
        if(delta <= 0) return;
        let earn = getTotalProd() * delta;
        if(earn > 0) {
            let maxStore = getMaxStorage();
            let newPending = gameData.pending + earn;
            if(newPending > maxStore && maxStore !== Infinity) newPending = maxStore;
            gameData.pending = newPending;
        }
        lastUpdate = now;
        updateUIAll();
        updateStoryTasks('mine', earn);
    }
    
    function collect() {
        if(gameData.pending <= 0) { showToast("Нет алмазов"); return; }
        let gain = Math.floor(gameData.pending);
        gameData.diamonds += gain;
        gameData.totalMined += gain;
        gameData.pending = 0;
        updateUIAll(); showToast(`+${gain} 💎`); saveGameData();
    }
    
    function buyMiner(lvl) {
        let price = minersData[lvl].costGold;
        if(gameData.gold >= price) {
            gameData.gold -= price;
            gameData.miners[lvl]++;
            updateStoryTasks('buy', 1);
            updateProgressiveTask(1);
            updateUIAll(); renderMiners(); saveGameData();
            showToast(`Нанят ${minersData[lvl].name}`);
        } else showToast(`Нужно ${price}💰`);
    }
    
    function updateProgressiveTask(amount) {
        let pt = gameData.progressiveTasks;
        pt.current += amount;
        if (pt.level < pt.need.length && pt.current >= pt.need[pt.level]) {
            let reward = pt.rewards[pt.level];
            if (reward) {
                gameData.miners[reward.minerLevel] += reward.count;
                showToast(`✅ Прогрессивное задание ${pt.level+1} выполнено! +${reward.count} шахтёров ${reward.minerLevel} уровня.`);
                pt.level++;
                saveGameData();
                renderMiners();
            }
        }
        saveGameData();
    }
    
    function claimDailyLogin() {
        const now = Date.now();
        const today = new Date(now).setHours(0,0,0,0);
        const last = gameData.dailyLogin.lastLoginDate;
        if (last && today - last < 86400000) { showToast("Бонус уже получен сегодня!"); return; }
        let day = (gameData.dailyLogin.currentDay % 30) + 1;
        let rewardMsg = "";
        if (day <= 10) {
            let goldReward = 1000 + (day-1)*200;
            gameData.gold += goldReward;
            rewardMsg = `+${goldReward}💰`;
        } else if (day <= 20) {
            let diaReward = 500 + (day-11)*100;
            gameData.diamonds += diaReward;
            rewardMsg = `+${diaReward}💎`;
        } else {
            let minerLevel = (day-21) % 3 + 3;
            gameData.miners[minerLevel] += 1;
            rewardMsg = `+1 шахтёр ${minerLevel} уровня`;
        }
        if (day === 30) {
            gameData.miners[6] += 1;
            rewardMsg += ` +1 шахтёр 6 уровня (бонус месяца)!`;
        }
        gameData.dailyLogin.currentDay = day;
        gameData.dailyLogin.lastLoginDate = today;
        showToast(`🎁 Ежедневный бонус (день ${day}): ${rewardMsg}`);
        saveGameData();
        renderMiners();
        updateUIAll();
    }
    
    function randomRange(min,max) { return Math.floor(Math.random()*(max-min+1)+min); }
    function isProfitable() { return Math.random() < 0.05; }
    function bronzeDrop() {
        if(isProfitable()) return { gold: randomRange(800,1000), diamonds: randomRange(8000,10000), superBucks: randomRange(120,150), miners: { level:1, count: randomRange(1,2) } };
        else return { gold: randomRange(1,50), diamonds: randomRange(1,200), superBucks: randomRange(1,10) };
    }
    function silverDrop() {
        if(isProfitable()) return { gold: randomRange(2000,3000), diamonds: randomRange(20000,25000), superBucks: randomRange(270,350), miners: { level:2, count: randomRange(1,3) } };
        else return { gold: randomRange(1,100), diamonds: randomRange(1,500), superBucks: randomRange(1,15) };
    }
    function goldenDrop() {
        if(isProfitable()) return { gold: randomRange(4000,5000), diamonds: randomRange(40000,50000), superBucks: randomRange(600,750), miners: { level:4, count:1 } };
        else return { gold: randomRange(1,200), diamonds: randomRange(1,1000), superBucks: randomRange(1,30) };
    }
    function starterDrop() {
        if(isProfitable()) return { gold: randomRange(50000,100000), diamonds: randomRange(200000,500000), superBucks: randomRange(400,1000), miners: { l6:1, l5:randomRange(1,3), l4:randomRange(1,5), l3:randomRange(1,5) } };
        else return { gold: randomRange(1000,10000), diamonds: randomRange(1000,10000), superBucks: randomRange(10,100) };
    }
    function oilChestDrop() { return { oil: randomRange(20,160) }; }
    function oilResourceBoxDrop() {
        if(isProfitable()) return { gold: randomRange(15000,30000), diamonds: randomRange(15000,30000), miners: { level: randomRange(5,6), count:1 } };
        else return { gold: randomRange(500,5000), diamonds: randomRange(500,5000) };
    }
    
    function applyDrop(drop) {
        if(drop.gold) gameData.gold += drop.gold;
        if(drop.diamonds) gameData.diamonds += drop.diamonds;
        if(drop.superBucks) gameData.superBucks += drop.superBucks;
        if(drop.bucks) gameData.bucks += drop.bucks;
        if(drop.oil) gameData.oil += drop.oil;
        if(drop.miners) {
            if(drop.miners.level) gameData.miners[drop.miners.level] += drop.miners.count;
            else {
                if(drop.miners.l6) gameData.miners[6] += drop.miners.l6;
                if(drop.miners.l5) gameData.miners[5] += drop.miners.l5;
                if(drop.miners.l4) gameData.miners[4] += drop.miners.l4;
                if(drop.miners.l3) gameData.miners[3] += drop.miners.l3;
            }
        }
        updateUIAll(); renderMiners(); saveGameData();
        updateStoryTasks('openBox', 1);
    }
    
    function openBox(price, currencyType, dropFunc) {
        if(currencyType === 'super' && gameData.superBucks < price) { showToast(`Нужно ${price} 💸`); return false; }
        if(currencyType === 'bucks' && gameData.bucks < price) { showToast(`Нужно ${price} 💵`); return false; }
        if(currencyType === 'oil' && gameData.oil < price) { showToast(`Нужно ${price} 🛢️`); return false; }
        if(currencyType === 'super') gameData.superBucks -= price;
        else if(currencyType === 'bucks') gameData.bucks -= price;
        else if(currencyType === 'oil') gameData.oil -= price;
        let drop = dropFunc();
        applyDrop(drop);
        showModal("🎁 Результат", formatDrop(drop));
        return true;
    }
    
    function formatDrop(drop) {
        let lines = [];
        if(drop.gold) lines.push(`💰 +${drop.gold}`);
        if(drop.diamonds) lines.push(`💎 +${drop.diamonds}`);
        if(drop.superBucks) lines.push(`💸 +${drop.superBucks}`);
        if(drop.bucks) lines.push(`💵 +${drop.bucks}`);
        if(drop.oil) lines.push(`🛢️ +${drop.oil}`);
        if(drop.miners) {
            if(drop.miners.level) lines.push(`⛏ +${drop.miners.count} шахтёр ${drop.miners.level}ур`);
            else {
                if(drop.miners.l6) lines.push(`⛏ +${drop.miners.l6} шахтёр 6ур`);
                if(drop.miners.l5) lines.push(`⛏ +${drop.miners.l5} шахтёр 5ур`);
                if(drop.miners.l4) lines.push(`⛏ +${drop.miners.l4} шахтёр 4ур`);
                if(drop.miners.l3) lines.push(`⛏ +${drop.miners.l3} шахтёр 3ур`);
            }
        }
        return lines;
    }

        let modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `<div class="modal-window"><h3>${title}</h3><div>${lines.join("<br>")}</div><button class="close-modal-btn">Закрыть</button></div>`;

    function showToast(msg) {

        t.innerText = msg;
        t.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#221b33; color:#f0deff; padding:8px 20px; border-radius:60px; backdrop-filter:blur(8px); z-index:9999;";

    function updateStoryTasks(type, amount) {
        gameData.storyTasks.forEach(t => {
            if(t.type === type) {
                t.current += amount;
                if(t.current >= t.need) {
                    if(t.rewardOil) gameData.oil += t.rewardOil;
                    if(t.rewardGold) gameData.gold += t.rewardGold;
                    showToast(`✅ ${t.name} выполнен! +${t.rewardOil?t.rewardOil+"🛢️":t.rewardGold+"💰"}`);
                    t.current = 0;
                    t.need = Math.floor(t.need * 1.5);
                    if(t.need < 2) t.need = 2;
                    saveGameData();
                }
            }
        });
        renderStoryTasks();
        updateUIAll();
    }
    
    function dailyReward() {
        let now = Date.now();
        const oneDay = 24 * 3600 * 1000;
        if (gameData.lastDaily && (now - gameData.lastDaily) < oneDay) {
            let remaining = oneDay - (now - gameData.lastDaily);
            let hours = Math.floor(remaining / 3600000);
            let minutes = Math.floor((remaining % 3600000) / 60000);
            showToast(`Ежедневный бонус через ${hours}ч ${minutes}мин`);
            return;
        }
        let prodHour = getTotalProd() * 3600;
        if (prodHour < 100) prodHour = 1000;
        let r = Math.random();
        let rewardMsg = "";
        if (r < 0.33) {
            let lvl = randomRange(1, 3);
            gameData.miners[lvl]++;
            rewardMsg = `+1 шахтёр ${lvl} ур.`;
        } else if (r < 0.66) {
            let gold = Math.floor(prodHour * 0.2);
            if (gold < 200) gold = 500;
            gameData.gold += gold;
            rewardMsg = `+${gold}💰`;
        } else {
            let dia = Math.floor(prodHour * 1.5);
            if (dia < 300) dia = 1000;
            gameData.diamonds += dia;
            rewardMsg = `+${dia}💎`;
        }
        if (gameData.vipActive) {
            let vipBonus = Math.floor(prodHour * 0.5);
            gameData.gold += vipBonus;
            rewardMsg += ` +${vipBonus}💰 (VIP)`;
        }
        gameData.lastDaily = now;
        updateUIAll(); renderMiners(); saveGameData();
        showToast(`🎁 Ежедневный бонус: ${rewardMsg}`);
    }
    
    function vipChestDaily() {
        if (!gameData.vipActive) { showToast("Нужен VIP"); return; }
        let now = Date.now();
        const oneDay = 24 * 3600 * 1000;
        if (gameData.lastVipChest && (now - gameData.lastVipChest) < oneDay) {
            let remaining = oneDay - (now - gameData.lastVipChest);
            let hours = Math.floor(remaining / 3600000);
            showToast(`VIP клад через ${hours}ч`);
            return;
        }
        let r = Math.random();
        if (r < 0.25) { gameData.oil += 1; showToast("VIP клад: +1🛢️"); }
        else if (r < 0.5) { let g = randomRange(5000,20000); gameData.gold += g; showToast(`VIP клад: +${g}💰`); }
        else if (r < 0.75) { let d = randomRange(10000,100000); gameData.diamonds += d; showToast(`VIP клад: +${d}💎`); }
        else { let lvl = randomRange(3,5); gameData.miners[lvl]++; showToast(`VIP клад: +1 шахтёр ${lvl}ур.`); }
        gameData.lastVipChest = now;
        updateUIAll(); renderMiners(); saveGameData();
    }

    function getPrestigeCost() {
        let count = gameData.prestigeCount;
        return { bucksCost: Math.floor(50 * Math.pow(1.10, count)), superCost: Math.floor(2000 * Math.pow(1.35, count)) };
    }
    
    function doPrestige() {
        let { bucksCost, superCost } = getPrestigeCost();
        if(gameData.bucks < bucksCost || gameData.superBucks < superCost) {
            showToast(`Нужно ${bucksCost}💵 и ${superCost}💸`);
            return;
        }
        gameData.bucks -= bucksCost;
        gameData.superBucks -= superCost;
        gameData.prestigeMult += 0.1;
        gameData.prestigeCount++;
        let savedOil = gameData.oil;
        let savedBucks = gameData.bucks;
        gameData.diamonds = 0;
        gameData.gold = 10000;
        gameData.miners = [0,0,0,0,0,0,0,0];
        gameData.pending = 0;
        gameData.totalMined = 0;
        gameData.islandUnlocked = false;
        gameData.lastExpedition = 0;
        gameData.storyTasks.forEach(t => { t.current = 0; t.need = t.need > 1000 ? 1000 : t.need; });
        gameData.oil = savedOil;
        gameData.bucks = savedBucks;
        showToast(`✨ Престиж! Множитель x${gameData.prestigeMult.toFixed(2)}. Выдано 10000💰`);
        updateUIAll(); renderMiners(); renderStoryTasks(); saveGameData();
    }
    
    function buyIsland() {
        if(gameData.islandUnlocked) return showToast("Уже куплен");
        if(gameData.oil >= 100) { gameData.oil -= 100; gameData.islandUnlocked = true; updateUIAll(); saveGameData(); showToast("Остров открыт"); }
        else showToast("Нужно 100 нефти");
    }
    
    function startExpedition() {
        if(!gameData.islandUnlocked) return;
        let now = Date.now();
        let cd = 12*3600*1000;
        if(gameData.lastExpedition && (now - gameData.lastExpedition) < cd) {
            let left = cd - (now - gameData.lastExpedition);
            showToast(`Экспедиция через ${Math.floor(left/3600000)}ч`);
            return;
        }
        let prodHour = getTotalProd() * 3600;
        if(Math.random()<0.4) { gameData.oil += 1; showToast(`🛢️ +1 нефть`); }
        else { let dia = Math.floor(prodHour * (0.5+Math.random()*1.5)); if(dia<50) dia=100; gameData.diamonds += dia; gameData.totalMined += dia; showToast(`💎 +${dia} алмазов`); }
        gameData.lastExpedition = now;
        updateUIAll(); saveGameData();
    }
    
    function buyVIP(days, costBucks) {
        if(gameData.bucks < costBucks) { showToast(`Нужно ${costBucks} 💵`); return; }
        gameData.bucks -= costBucks;
        let expire = Date.now() + days * 24 * 3600 * 1000;
        if(!gameData.vipActive || gameData.vipExpire < expire) gameData.vipExpire = expire;
        gameData.vipActive = true;
        showToast(`🎖️ VIP на ${days} день(дней) активирован!`);
        updateUIAll(); saveGameData();
    }

                    let prod = 0;
                    for(let i=1;i<=7;i++) prod += (u.miners?.[i] || 0) * minersData[i].prodSec;

                    users.push({ username: u.username, prod: prod, vip: u.vipActive });
                });
                users.sort((a,b) => b.prod - a.prod);
                container.innerHTML = users.slice(0,100).map((u,i)=>`<div class="top-item"><span>${i+1}. ${u.username} ${u.vip ? '<span class="vip-icon">👑</span>' : ''}</span><span>${Math.floor(u.prod)} 💎/сек</span></div>`).join('');

    // Запуск
